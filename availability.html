<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Availability – Park View Caravan</title>
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="nav">
  <h1>Availability</h1>
  <nav>
    <a href="index.html">Home</a>
    <a href="gallery.html">Gallery</a>
    <a href="availability.html" class="active">Availability</a>
    <a href="book.html">Book Now</a>
    <a href="contact.html">Contact</a>
  </nav>
</header>

<main>
  <h2>Availability Calendar</h2>
  <p class="calendar-instruction">Click an available arrival date, then choose your departure date to see the booking price.</p>

  <div class="availability-widget">
    <div class="calendar-legend">
      <span><strong>Available</strong></span>
      <span><strong>Unavailable</strong></span>
      <span><strong>Selected</strong></span>
    </div>
    <div class="calendar-page">
      <div id="calendar-months" class="calendar-months"></div>
    </div>
    <aside class="booking-summary" id="booking-summary">
      <h3>Booking summary</h3>
      <p id="summary-dates">Select an arrival date to begin.</p>
      <p id="summary-nights"></p>
      <p id="summary-rate"></p>
      <p id="summary-total"></p>
      <p class="summary-message" id="summary-message"></p>
      <a id="book-now-btn" class="btn disabled" href="#">Book now</a>
      <button id="clear-selection" type="button" class="btn secondary hidden">Clear selection</button>
    </aside>
  </div>
</main>
<script src="availability.js"></script>

<footer>
  <p>&copy; 2026 Park View Caravan</p>
</footer>

</body>
</html>
