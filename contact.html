<header>

<section class="page-header fade-in">
    <h2>Contact & Booking Enquiries</h2>
    <p>Send us a message and we’ll get back to you as soon as possible.</p>
</section>

<section class="contact-section fade-in">
    <h3>Send an Enquiry</h3>

    <form action="mailto:Parkview426hru@gmail.com" method="post" enctype="text/plain">
        <label>Your Name</label>
        <input type="text" name="Name" required>

        <label>Your Email</label>
        <input type="email" name="Email" required>

        <label>Phone Number</label>
        <input type="text" name="Phone">

        <label>Arrival Date</label>
        <input type="date" name="Arrival">

        <label>Departure Date</label>
        <input type="date" name="Departure">

        <label>Number of Guests</label>
        <input type="text" name="Guests">

        <label>Your Message</label>
        <textarea name="Message" rows="5" required></textarea>

        <button type="submit" class="button">Send Enquiry</button>
    </form>
</section>

<footer>
    <p>© Parkview Caravan, Brean Sands</p>
</footer>

</body>
</html>
